<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minipa - Cadastrar Técnico</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; padding: 40px; }
        .card { background: white; max-width: 500px; margin: auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { color: #d32f2f; margin-bottom: 20px; font-weight: bold; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        .btn-save { background: #004a99; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; margin-top: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">CADASTRAR NOVO TÉCNICO (FILIAL)</div>
        <form method="POST">
            <label>Nome Completo do Técnico</label>
            <input type="text" name="nome" placeholder="Ex: João Silva" required>
            
            <label>Nome de Usuário (Login)</label>
            <input type="text" name="username" placeholder="Ex: joao.minipa" required>
            
            <label>Senha Provisória</label>
            <input type="password" name="password" placeholder="Defina a senha inicial" required>
            
            <button type="submit" class="btn-save">CADASTRAR TÉCNICO</button>
        </form>
        <a href="/dashboard" style="display:block; text-align:center; margin-top:15px; color:#888; text-decoration:none;">Voltar</a>
    </div>
</body>
