<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Nova OS - Minipa</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow border-0">
            <div class="card-header bg-danger text-white">
                <h3 class="mb-0">Abrir Ordem de Serviço</h3>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">Cliente</label>
                            <input type="text" name="cliente" class="form-control" placeholder="Nome do cliente ou empresa" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Modelo do Equipamento</label>
                            <input type="text" name="modelo" class="form-control" placeholder="Ex: ET-2042E" required>
                        </div>
                    </div>
                    
                    <div class="row mb-3">
                        <div class="col-md-4">
                            <label class="form-label">Nº de Série</label>
                            <input type="text" name="serie" class="form-control" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Nota Fiscal</label>
                            <input type="text" name="nf" class="form-control">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Garantia?</label>
                            <select name="garantia" class="form-select">
                                <option value="Não">Não</option>
                                <option value="Sim">Sim</option>
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Tipo de Serviço (Sugestão de Valor)</label>
                        <select id="seletor_servico" class="form-select mb-2">
                            <option value="">Selecione para preencher o valor...</option>
                            <option value="250.00">Troca de Placa (PCI)</option>
                            <option value="120.00">Reparo de Circuito/Bornes</option>
                            <option value="85.00">Calibração Padrão</option>
                        </select>
                        <label class="form-label">Valor do Orçamento (R$)</label>
                        <input type="number" step="0.01" name="valor" id="valor_final" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Defeito Relatado</label>
                        <textarea name="defeito" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success btn-lg">Salvar OS na Bancada</button>
                        <a href="/" class="btn btn-outline-secondary">Cancelar e Voltar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Lógica para preencher o valor automaticamente
        document.getElementById('seletor_servico').addEventListener('change', function() {
            document.getElementById('valor_final').value = this.value;
        });
    </script>
</body>
</html>
