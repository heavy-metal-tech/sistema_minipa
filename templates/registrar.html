<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minipa OS - Cadastro de Técnico</title>
    <style>
        body { font-family: sans-serif; background: #004a99; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: white; padding: 30px; border-radius: 10px; width: 350px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #004a99; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color: #004a99; text-align: center;">Novo Técnico</h2>
        <form method="POST">
            <input type="text" name="nome" placeholder="Nome Completo" required>
            <input type="text" name="username" placeholder="Usuário (ex: will.tech)" required>
            <input type="password" name="password" placeholder="Senha" required>
            <button type="submit">Cadastrar e Login</button>
        </form>
    </div>
</body>
</html>
