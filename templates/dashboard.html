<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minipa Precision | Command Center</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --minipa-blue: #0d47a1; --dark-bg: #061a33; }
        body { background-color: #f0f2f5; font-family: 'Inter', sans-serif; }
        .navbar { background: white; border-bottom: 4px solid var(--minipa-blue); box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-stats { background: linear-gradient(135deg, var(--dark-bg), var(--minipa-blue)); color: white; border-radius: 15px; }
        .card-white { background: white; border: none; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.05); }
        .chart-container { position: relative; height: 250px; width: 100%; }
        .btn-new { background: #d32f2f; color: white; border-radius: 50px; font-weight: 800; padding: 12px 30px; }
    </style>
</head>
<body>

<nav class="navbar mb-4 py-2">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="#">SISTEMA MINIPA</a>
        <div class="d-flex gap-2">
            <div class="bg-primary text-white px-3 py-1 rounded-pill small">
                <i class="fas fa-user-circle me-2"></i> {{ current_user.nome_completo }}
            </div>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm rounded-circle"><i class="fas fa-power-off"></i></a>
        </div>
    </div>
</nav>

<div class="container pb-5">
    <div class="row g-4 mb-5">
        <div class="col-md-3">
            <div class="card-stats p-4 h-100">
                <small class="opacity-75">Serviços Ativos</small>
                <h1 class="display-4 fw-bold">{{ ordens|length }}</h1>
            </div>
        </div>
        <div class="col-md-5">
            <div class="card-white p-4 h-100">
                <h6 class="fw-bold"><i class="fas fa-chart-line text-primary me-2"></i>Volume Real</h6>
                <div class="chart-container"><canvas id="mainChart"></canvas></div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card-white p-4 text-center">
                <a href="#" class="btn btn-new w-100 mb-3">ABRIR NOVA OS</a>
                <div class="alert alert-info py-2 small">Estoque: {{ estoque|length }} itens</div>
            </div>
        </div>
    </div>

    <div class="card-white overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="bg-dark text-white">
                    <tr>
                        <th class="ps-4">OS</th>
                        <th>Cliente</th>
                        <th>Equipamento</th>
                        <th>Valor</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody>
                    {% for os in ordens %}
                    <tr>
                        <td class="ps-4 fw-bold">#{{ os.id }}</td>
                        <td>{{ os.cliente }}</td>
                        <td>{{ os.equipamento }}</td>
                        <td>R$ {{ os.valor }}</td>
                        <td class="text-center">
                            <a href="{{ url_for('deletar_os', id=os.id) }}" class="text-danger" onclick="return confirm('Excluir OS?')">
                                <i class="fas fa-trash-alt"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('mainChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Ordens no Sistema'],
            datasets: [{
                label: 'Quantidade',
                data: [{{ ordens|length }}],
                backgroundColor: '#0d47a1'
            }]
        },
        options: { maintainAspectRatio: false }
    });
</script>
</body>
</html>
