<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Equipamento</th>
            <th>Série</th>
            <th>Garantia</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
        {% for os in ordens %}
        <tr>
            <td>#{{ os.id }}</td>
            <td>{{ os.equipamento }}</td>
            <td>{{ os.serie }}</td>
            <td>{{ os.garantia }}</td>
            <td>
                <a href="{{ url_for('gerar_pdf', os_id=os.id) }}" title="Baixar PDF" style="color: #d32f2f; margin-right: 10px;">
                    <i class="fas fa-file-pdf"></i>
                </a>
                <a href="{{ url_for('enviar_minipa', os_id=os.id) }}" title="Enviar para Matriz" style="color: #004a99;">
                    <i class="fas fa-paper-plane"></i>
                </a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
